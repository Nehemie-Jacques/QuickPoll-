services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CREATOR_JWT_SECRET: dev-secret-change-in-prod
      IP_HASH_SALT: dev-salt
      AWS_REGION: eu-west-1
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      DYNAMODB_POLLS_TABLE: quickpoll-polls
      DYNAMODB_VOTES_TABLE: quickpoll-votes
    depends_on:
      - dynamodb
    profiles:
      - full
