name: CI

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          CREATOR_JWT_SECRET: ci-secret-minimum-32-characters-long
          IP_HASH_SALT: ci-salt

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
          load: true
          tags: quickpoll:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: quickpoll:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
